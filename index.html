/* ──────────────────────────────────────────────
 MILESTONE HELPERS
────────────────────────────────────────────── */
// Returns the bar % position of the most recently completed milestone (or 0)
function _getLastCompletedMilestonePct(project) {
 // Use the full milestone date range (Kickoff→Launch) as 0%→100%
 const allMs = (project.milestones || []).filter(m => m.date);
 if (!allMs.length) return 0;
 const sortedAll = [...allMs].sort((a,b) => a.date < b.date ? -1 : 1);
 const toTs = d => new Date(d + 'T00:00:00').getTime();
 const startTs = toTs(sortedAll[0].date);
 const endTs   = toTs(sortedAll[sortedAll.length - 1].date);
 if (endTs <= startTs) return 0;
 const completed = allMs.filter(m => m.completed);
 if (!completed.length) return 0;
 // Last completed by date (newest)
 const sortedDone = [...completed].sort((a,b) => a.date > b.date ? -1 : 1);
 const lastM = sortedDone[0];
 const mTs = toTs(lastM.date);
 const pct = ((mTs - startTs) / (endTs - startTs)) * 100;
 return Math.max(0, Math.min(100, pct));
}

// Primary progress function — milestone-driven.
// Bar fills to where the last completed dot sits on the timeline.
// Special rule: if only "Project Kickoff" (the first milestone) is done, return 5%
// so the bar shows a small "started" indicator without jumping past subsequent dots.
function getMilestoneProgress(project) {
 const milestones = project.milestones || [];
 if (!milestones.length) return 0;
 const completed = milestones.filter(m => m.completed);
 if (!completed.length) return 0;
 // Special case: only the first milestone (Project Kickoff) is complete
 // → show 5% starter fill rather than date-position (0%) or count-based overshoot
 const sortedByDate = [...milestones].sort((a, b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
 const firstMs = sortedByDate[0];
 if (completed.length === 1 && firstMs && completed[0].id === firstMs.id) return 5;
 // Date-position approach (matches visual dot positions on the bar)
 const posPct = _getLastCompletedMilestonePct(project);
 if (posPct > 0) return Math.round(posPct);
 // Fallback: count-based when start/end dates aren't configured
 return Math.round((completed.length / milestones.length) * 100);
}

/* ──────────────────────────────────────────────
 MILESTONE DOTS — positions milestones along the progress bar
 Uses the full sorted milestone date range as 0%→100%.
 "Project Kickoff" is the first dot (0%), "Target Launch" is the last (100%).
 Adds a "Today" line to show current date position.
────────────────────────────────────────────── */
function _buildMilestoneDots(project) {
 const milestones = (project.milestones || []).filter(m => m.date || m.name);
 if (!milestones.length) return '';

 const withDates = milestones.filter(m => m.date);
 if (!withDates.length) return '';

 const toTs = d => new Date(d + 'T00:00:00').getTime();
 const sorted = [...milestones].sort((a, b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
 const datesOnly = sorted.filter(m => m.date).map(m => m.date);
 const minD = datesOnly[0];
 const maxD = datesOnly[datesOnly.length - 1];
 const startTs = toTs(minD);
 const endTs   = toTs(maxD);
 const hasRange = endTs > startTs;

 const dots = [];

 sorted.forEach(m => {
  let pct;
  if (hasRange && m.date) {
   pct = ((toTs(m.date) - startTs) / (endTs - startTs)) * 100;
   pct = Math.max(0, Math.min(100, pct));
  } else {
   pct = 50;
  }
  const isKickoff = m.name === 'Project Kickoff';
  const isLaunch  = m.name === 'Target Launch';
  const dateStr = m.date ? ` · ${formatDateShort(m.date)}` : '';
  const doneStr = m.completed ? ' · ✓ Done' : '';
  const tip = `${m.name || 'Milestone'}${dateStr}${doneStr}`;
  const anchorClass = (isKickoff || isLaunch) ? ' milestone-dot-anchor' : '';
  const endClass    = isLaunch ? ' milestone-dot-anchor-end' : '';
  dots.push(`<div class="milestone-dot${m.completed ? ' is-done' : ''}${anchorClass}${endClass}" style="left:${pct.toFixed(1)}%" data-tip="${escHtml(tip)}"></div>`);
 });

 // ── Today line ──
 let todayHtml = '';
 if (hasRange) {
  const today = new Date().toISOString().slice(0,10);
  const todayPct = Math.min(100, Math.max(0, ((toTs(today) - startTs) / (endTs - startTs)) * 100));
  todayHtml = `<div class="tl-today-line" style="left:${todayPct.toFixed(1)}%" title="Today"><div class="tl-today-label">Today</div></div>`;
 }

 return `<div class="milestone-dot-track">${todayHtml}${dots.join('')}</div>`;
}

function _sortTasks(tasks, by, dir) {
 const ord = { 'Blocked':3, 'In Progress':2, 'Not Started':1, 'Done':0 };
 return [...tasks].sort((a, b) => {
 let va, vb;
 switch(by) {
 case 'dueDate': va = a.dueDate||'9999'; vb = b.dueDate||'9999'; break;
 case 'status': va = ord[a.status]??0; vb = ord[b.status]??0; break;
 case 'owner': va = (a.owner||'').toLowerCase(); vb = (b.owner||'').toLowerCase(); break;
 default: va = (a.name||'').toLowerCase(); vb = (b.name||'').toLowerCase();
 }
 if (va < vb) return dir === 'asc' ? -1 : 1;
 if (va > vb) return dir === 'asc' ? 1 : -1;
 return 0;
 });
}

/* ────────────────────────────────────────────────
 EVENT DELEGATION — single listener on #tasks-panel
 All task interactions bubble up to this one handler.
────────────────────────────────────────────────── */
function _bindTasksSection(projectId) {
 const panel = document.getElementById('tasks-panel');
 if (!panel) return;

 // ── Click delegation ──
 panel.addEventListener('click', function handleTaskClick(e) {
 const btn = e.target.closest('[data-action]');
 if (!btn) return;
 const action = btn.dataset.action;
 const taskId = btn.dataset.taskId;

 if (action === 'toggle-done') {
 e.preventDefault();
 const proj = DB.getProject(projectId);
 const t = (proj.tasks||[]).find(x => x.id === taskId);
 if (!t) return;
 const nowDone = t.status !== 'Done';
 // Update in the tasks array directly so we can set completedOn atomically
 const tasks = proj.tasks.map(task => {
 if (task.id !== taskId) return task;
 return {
 ...task,
 status: nowDone ? 'Done' : 'Not Started',
 completedOn: nowDone ? new Date().toISOString().slice(0,10) : null
 };
 });
 DB.updateProject(projectId, { tasks });
 _refreshTasksSection(projectId);
 if (nowDone) Toast.success('Task marked complete!');
 return;
 }

 if (action === 'delete-task') {
 e.preventDefault();
 if (!confirm('Delete this task?')) return;
 const proj = DB.getProject(projectId);
 const tasks = (proj.tasks||[]).filter(t => t.id !== taskId);
 DB.updateProject(projectId, { tasks });
 _refreshTasksSection(projectId);
 _updateDetailTabBadge('tasks', tasks.length);
 Toast.success('Task deleted');
 return;
 }

 if (action === 'edit-cell') {
 e.preventDefault();
 _activateTaskCellEdit(btn, projectId);
 return;
 }

 if (action === 'add-task') {
 e.preventDefault();
 _doAddTask(projectId);
 return;
 }

 if (action === 'sort-dir') {
 e.preventDefault();
 AppState.taskSortDir = (AppState.taskSortDir||'asc') === 'asc' ? 'desc' : 'asc';
 _refreshTasksSection(projectId);
 return;
 }

 if (action === 'sort-col') {
 e.preventDefault();
 const col = btn.dataset.sort;
 if (AppState.taskSortBy === col) {
 AppState.taskSortDir = AppState.taskSortDir === 'asc' ? 'desc' : 'asc';
 } else {
 AppState.taskSortBy = col;
 AppState.taskSortDir = 'asc';
 }
 _refreshTasksSection(projectId);
 return;
 }
 });

 // ── Change delegation (status select, owner select, sort select) ──
 panel.addEventListener('change', function handleTaskChange(e) {
 if (e.target.dataset.action === 'status-change') {
 _saveTaskField(projectId, e.target.dataset.taskId, 'status', e.target.value);
 // Refresh to update row styling (overdue class, done strikethrough)
 _refreshTasksSection(projectId);
 return;
 }
 if (e.target.dataset.action === 'owner-change') {
  const val = e.target.value;
  const taskId = e.target.dataset.taskId;
  if (val === '__new__') {
   // Prompt for a new team member name
   const newName = prompt('Enter the name of the new team member:');
   if (!newName || !newName.trim()) { _refreshTasksSection(projectId); return; }
   const trimmed = newName.trim();
   // Add to team if not already there
   const proj = DB.getProject(projectId);
   const members = proj.teamMembers || [];
   if (!members.includes(trimmed)) {
    DB.updateProject(projectId, { teamMembers: [...members, trimmed] });
    Toast.success(`${trimmed} added to team`);
   }
   _saveTaskField(projectId, taskId, 'owner', trimmed);
  } else {
   _saveTaskField(projectId, taskId, 'owner', val);
  }
  _refreshTasksSection(projectId);
  return;
 }
 if (e.target.id === 'task-sort-select') {
 AppState.taskSortBy = e.target.value;
 _refreshTasksSection(projectId);
 return;
 }
 });

/* ── Add task handler ── */
function _doAddTask(projectId) {
 const panel = document.getElementById('tasks-panel');
 if (!panel) return;
 const name = (panel.querySelector('#new-task-name')?.value || '').trim();
 if (!name) { panel.querySelector('#new-task-name')?.focus(); return; }
 let owner = (panel.querySelector('#new-task-owner')?.value || '').trim();
 const due = panel.querySelector('#new-task-due')?.value || '';
 const status = panel.querySelector('#new-task-status')?.value || 'Not Started';
 const notes = (panel.querySelector('#new-task-notes')?.value || '').trim();

 const proj = DB.getProject(projectId);

 // Handle "Add new…" option
 if (owner === '__new__') {
  const newName = prompt('Enter the name of the new team member:');
  if (!newName || !newName.trim()) { owner = ''; }
  else {
   owner = newName.trim();
   const members = proj.teamMembers || [];
   if (!members.includes(owner)) {
    DB.updateProject(projectId, { teamMembers: [...members, owner] });
    Toast.success(`${owner} added to team`);
   }
  }
 }

 const tasks = [...(proj.tasks||[]), { id: genId(), name, owner, dueDate: due||null, status, notes }];
 DB.updateProject(projectId, { tasks });
 _refreshTasksSection(projectId);
 _updateDetailTabBadge('tasks', tasks.length);
 // Refocus name field after refresh
 setTimeout(() => document.getElementById('tasks-panel')?.querySelector('#new-task-name')?.focus(), 50);
 Toast.success('Task added');
}

/* ── Inline cell edit — updates in-place, no full section refresh ── */
function _activateTaskCellEdit(el, projectId) {
 // Guard: already editing this cell
 if (el.querySelector('input')) return;
 const field = el.dataset.field;
 const taskId = el.dataset.taskId;
 const proj = DB.getProject(projectId);
 const task = (proj.tasks||[]).find(t => t.id === taskId);
 if (!task) return;

 const rawVal = task[field] || '';
 const origText = el.textContent;

 // Build input
 const input = document.createElement('input');
 input.className = 'task-cell-input';
 if (field === 'dueDate' || field === 'completedOn') {
 input.type = 'date';
 input.value = rawVal;
 input.style.colorScheme = 'dark';
 input.style.width = '128px';
 } else {
 input.type = 'text';
 input.value = rawVal === '—' ? '' : rawVal;
 input.style.minWidth = field === 'notes' ? '150px' : '90px';
 }

 el.textContent = '';
 el.appendChild(input);
 input.focus();
 try { input.select(); } catch(e) {}

 let saved = false;

 const save = () => {
 if (saved) return;
 saved = true;
 const val = input.value.trim();
 _saveTaskField(projectId, taskId, field, val || null);
 // Update display in-place (no full section refresh)
 el.textContent = field === 'dueDate'
 ? (val ? formatDateShort(val) : '—')
 : (val || '—');
 // If the row's overdue/done class needs to change, trigger a full refresh
 if (field === 'dueDate' || field === 'status' || field === 'completedOn') {
 _refreshTasksSection(projectId);
 }
 };

 const cancel = () => {
 if (saved) return;
 saved = true;
 el.textContent = origText;
 };

 input.addEventListener('blur', save);
 input.addEventListener('keydown', e => {
 if (e.key === 'Enter') { e.preventDefault(); input.removeEventListener('blur', save); save(); }
 if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', save); cancel(); }
 });
}

/* ── Save one field on a task (no side effects) ── */
function _saveTaskField(projectId, taskId, field, value) {
 const proj = DB.getProject(projectId);
 const tasks = (proj.tasks||[]).map(t =>
 t.id === taskId ? { ...t, [field]: value } : t
 );
 DB.updateProject(projectId, { tasks });
}

/* ── Re-render the tasks panel and re-attach the delegation listener ── */
function _refreshTasksSection(projectId) {
 const proj = DB.getProject(projectId);
 const panel = document.getElementById('dv-section-tasks');
 if (!panel) return;
 panel.innerHTML = _buildTasksSection(proj);
 _bindTasksSection(projectId);
}

function _buildTimelineSection(project) {
 const milestones = project.milestones || [];
 const sorted = [...milestones].sort((a,b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);

 function msState(m) {
 if (m.completed) return 'done';
 if (m.date && isOverdue(m.date)) return 'overdue';
 return 'upcoming';
 }

 const doneCount = milestones.filter(m => m.completed).length;
 const overdueCount = milestones.filter(m => !m.completed && m.date && isOverdue(m.date)).length;
 const upcomingCount= milestones.filter(m => !m.completed && !(m.date && isOverdue(m.date))).length;

 function milestonePillsHtml() {
 if (!sorted.length) return '';
 return sorted.map((m,i) => {
 const state = msState(m);
 const color = state === 'done' ? 'var(--status-live)' : state === 'overdue' ? 'var(--danger)' : 'var(--status-in-progress)';
 const icon = state === 'done' ? '' : state === 'overdue' ? '!' : '·';
 const days = m.date ? daysUntil(m.date) : null;
 let subtext = m.date ? formatDateShort(m.date) : 'No date';
 if (!m.completed && days !== null) {
 if (days < 0) subtext += ` · ${Math.abs(days)}d overdue`;
 else if (days === 0) subtext += ' · Today';
 else subtext += ` · in ${days}d`;
 }
 return `<div class="ms-pill" data-ms-id="${m.id}">
 <button class="ms-check-btn" data-action="ms-toggle" data-ms-id="${m.id}" title="${m.completed ? 'Mark incomplete' : 'Mark complete'}"
 style="border-color:${color};color:${m.completed ? color : 'transparent'};background:${m.completed ? color+'22' : 'transparent'}">
 ${m.completed ? '' : ''}
 </button>
 <div class="ms-pill-body">
 <span class="ms-pill-name" data-action="ms-edit-name" data-ms-id="${m.id}">${escHtml(m.name)}</span>
 <span class="ms-pill-sub" style="color:${color}">
 <span data-action="ms-edit-date" data-ms-id="${m.id}">${subtext}</span>
 </span>
 </div>
 <button class="task-action-btn danger ms-delete-btn" data-action="ms-delete" data-ms-id="${m.id}" title="Delete milestone">Del</button>
 </div>`;
 }).join('');
 }

 // Visual timeline bar — shows all milestones as dots, including undated ones
 function timelineBarHtml() {
 if (sorted.length < 2) return '';
 const toTs = d => new Date(d).getTime();
 const today = new Date().toISOString().slice(0,10);

 // Date range: use the span of all dated milestones
 const datesOnly = sorted.filter(m => m.date).map(m => m.date);
 if (!datesOnly.length) return ''; // no dates at all — can't draw a bar
 let minD = datesOnly[0];
 let maxD = datesOnly[datesOnly.length - 1];
 // If all milestones share one date, extend range slightly so the bar renders
 if (minD === maxD) {
  const d = new Date(minD); d.setDate(d.getDate() + 30);
  maxD = d.toISOString().slice(0,10);
 }
 const range = toTs(maxD) - toTs(minD) || 1;
 const todayPct = Math.min(100, Math.max(0, ((toTs(today) - toTs(minD)) / range) * 100));

 // First pass: assign % positions to dated milestones
 const posList = sorted.map(m => ({
  m,
  pct: m.date ? Math.max(0, Math.min(100, ((toTs(m.date) - toTs(minD)) / range) * 100)) : null
 }));

 // Second pass: interpolate positions for undated milestones between their neighbours
 posList.forEach((item, i) => {
  if (item.pct !== null) return;
  let prevPct = 0, nextPct = 100, prevIdx = -1, nextIdx = posList.length;
  for (let j = i - 1; j >= 0; j--) { if (posList[j].pct !== null) { prevPct = posList[j].pct; prevIdx = j; break; } }
  for (let j = i + 1; j < posList.length; j++) { if (posList[j].pct !== null) { nextPct = posList[j].pct; nextIdx = j; break; } }
  const steps = nextIdx - prevIdx;
  item.pct = prevPct + (nextPct - prevPct) * ((i - prevIdx) / steps);
 });

 const markers = posList.map(({ m, pct }) => {
  const state = msState(m);
  const color = state === 'done' ? 'var(--status-live)' : state === 'overdue' ? 'var(--danger)' : 'var(--status-in-progress)';
  const tip = m.date ? `${escHtml(m.name)}: ${m.date}` : `${escHtml(m.name)} (no date)`;
  return `<div class="tl-marker" style="left:${pct.toFixed(1)}%;background:${color}" title="${tip}">
 <div class="tl-marker-label">${escHtml(m.name)}</div>
 </div>`;
 }).join('');

 const progPct = getMilestoneProgress(project);

 return `<div class="tl-bar-wrap">
 <div class="tl-bar-track">
 <div class="tl-bar-fill" style="width:${progPct.toFixed(1)}%"></div>
 <div class="tl-today-line" style="left:${todayPct.toFixed(1)}%" title="Today">
 <div class="tl-today-label">Today</div>
 </div>
 ${markers}
 </div>
 <div class="tl-bar-ends">
 <span style="color:var(--text-muted);font-size:11px">${formatDateShort(minD)}</span>
 <span style="color:var(--text-muted);font-size:11px">${formatDateShort(maxD)}</span>
 </div>
 </div>`;
 }

 return `
 <div class="dv-card" id="timeline-panel">
 <div class="tasks-toolbar" style="margin-bottom:var(--space-4)">
 <div class="dv-section-title" style="margin:0">Timeline & Milestones</div>
 <div class="tasks-stats-row">
 ${doneCount > 0 ? `<span class="stat-highlight">${doneCount} done</span>` : ''}
 ${overdueCount > 0 ? `<span class="stat-danger">${overdueCount} overdue</span>` : ''}
 ${upcomingCount > 0? `<span style="color:var(--text-secondary)">${upcomingCount} upcoming</span>` : ''}
 </div>
 </div>

 ${timelineBarHtml()}

 <div class="ms-list" id="ms-list">
 ${milestones.length ? milestonePillsHtml() : `
 <div style="text-align:center;padding:var(--space-8);color:var(--text-muted);font-size:var(--font-sm)">
 No milestones yet — add one below
 </div>`}
 </div>

 <!-- Add milestone form -->
 <div class="task-add-row" style="margin-top:var(--space-4)">
 <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:var(--space-2)">+ New Milestone</div>
 <div style="display:flex;gap:var(--space-3);align-items:flex-end;flex-wrap:wrap">
 <div>
 <div class="task-add-label">Milestone Name *</div>
 <input id="new-ms-name" class="input input-sm" type="text" placeholder="e.g. Design Approved" style="min-width:220px" autocomplete="off" />
 </div>
 <div>
 <div class="task-add-label">Target Date</div>
 <input id="new-ms-date" class="input input-sm" type="date" style="color-scheme:dark" />
 </div>
 <div>
 <button class="btn btn-primary btn-sm" data-action="ms-add">Add Milestone</button>
 </div>
 </div>
 </div>
 </div>
 `;
}

 if (!panel) return;

 // ── Image attachment state (local to this binding) ──
 let _pendingImageData = null;
 let _pendingImageName = null;

 function clearNoteImage() {
  _pendingImageData = null;
  _pendingImageName = null;
  const prev = panel.querySelector('#note-img-preview');
  const thumb = panel.querySelector('#note-img-thumb');
  const fname = panel.querySelector('#note-img-filename');
  const inp = panel.querySelector('#new-note-img-input');
  if (prev) prev.style.display = 'none';

  if (fname) fname.textContent = '';
  if (inp) inp.value = '';
 }

 const imgInput = panel.querySelector('#new-note-img-input');
 if (imgInput) {
  imgInput.addEventListener('change', () => {
   const file = imgInput.files[0];
   if (!file) return;
   if (file.size > 3 * 1024 * 1024) {
    Toast.error('Image must be under 3 MB');
    imgInput.value = '';
    return;
   }
   const reader = new FileReader();
   reader.onload = (ev) => {
    _pendingImageData = ev.target.result;
    _pendingImageName = file.name;
    const prev = panel.querySelector('#note-img-preview');
    const thumb = panel.querySelector('#note-img-thumb');
    const fname = panel.querySelector('#note-img-filename');
    if (thumb) thumb.src = _pendingImageData;
    if (fname) fname.textContent = file.name;
    if (prev) prev.style.display = 'flex';
   };
   reader.readAsDataURL(file);
  });
 }

 const clearBtn = panel.querySelector('#note-img-clear');
 if (clearBtn) clearBtn.addEventListener('click', clearNoteImage);

 panel.addEventListener('click', function handleNoteClick(e) {
 const btn = e.target.closest('[data-action]');
 if (!btn) return;
 const action = btn.dataset.action;
 const noteId = btn.dataset.noteId;

 if (action === 'note-add') {
 const ta = panel.querySelector('#new-note-body');

 if (!body && !_pendingImageData) { Toast.error('Note cannot be empty'); ta?.focus(); return; }
 const proj = DB.getProject(projectId);
 const noteObj = {
  id: genId(), timestamp: new Date().toISOString(),
  author: CURRENT_USER, body: body || ''
 };
 if (_pendingImageData) {

 }
 const notes = [...(proj.notes||[]), noteObj];
 DB.updateProject(projectId, { notes });
 _refreshNotesSection(projectId);
 _updateDetailTabBadge('notes', notes.length);
 ta.value = '';
 clearNoteImage();
 Toast.success('Note added');
 return;
 }

 if (action === 'note-delete') {
 if (!confirm('Delete this note?')) return;
 const proj = DB.getProject(projectId);
 const notes = (proj.notes||[]).filter(n => n.id !== noteId);
 DB.updateProject(projectId, { notes });
 _refreshNotesSection(projectId);
 _updateDetailTabBadge('notes', notes.length);
 Toast.success('Note deleted');
 return;
 }

 if (action === 'note-edit') {
 _activateNoteEdit(btn, projectId, noteId);
 return;
 }
 });

 // Ctrl+Enter submits note
 const ta = panel.querySelector('#new-note-body');
 if (ta) {
 ta.addEventListener('keydown', e => {
 if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
 e.preventDefault();
 panel.querySelector('[data-action="note-add"]')?.click();
 }
 });
 }

 }

 ta.addEventListener('blur', save);
 ta.addEventListener('keydown', e => {
 if (e.key === 'Escape') { e.preventDefault(); ta.removeEventListener('blur', save); cancel(); }

/* ── Auto-detect file type from URL or MIME type ── */
function detectFileType(url, mimeType) {
 if (mimeType) {
  if (mimeType.startsWith('image/')) return 'image';
  if (mimeType === 'application/pdf') return 'pdf';
  if (mimeType.includes('spreadsheet') || mimeType.includes('excel') || mimeType.includes('csv')) return 'sheet';
  if (mimeType.includes('word') || mimeType.includes('document')) return 'doc';
  if (mimeType.includes('presentation') || mimeType.includes('powerpoint')) return 'slide';
  if (mimeType.startsWith('video/')) return 'video';
  if (mimeType.includes('zip') || mimeType.includes('archive') || mimeType.includes('compressed')) return 'zip';
  return 'other';
 }
 if (!url) return 'link';
 const u = url.toLowerCase();
 if (u.includes('figma.com')) return 'figma';
 if (u.includes('docs.google.com/spreadsheets') || u.includes('sheets.google.com')) return 'sheet';
 if (u.includes('docs.google.com/document')) return 'doc';
 if (u.includes('docs.google.com/presentation') || u.includes('slides.google.com')) return 'slide';
 if (u.includes('drive.google.com')) return 'link';
 if (u.includes('youtube.com') || u.includes('youtu.be') || u.includes('vimeo.com')) return 'video';
 if (u.includes('slack.com')) return 'link';
 if (u.match(/\.(pdf)(\?|$|#)/)) return 'pdf';
 if (u.match(/\.(png|jpg|jpeg|gif|webp|svg|bmp|tiff)(\?|$|#)/)) return 'image';
 if (u.match(/\.(doc|docx)(\?|$|#)/)) return 'doc';
 if (u.match(/\.(xls|xlsx|csv)(\?|$|#)/)) return 'sheet';
 if (u.match(/\.(ppt|pptx)(\?|$|#)/)) return 'slide';
 if (u.match(/\.(mp4|mov|avi|mkv|webm)(\?|$|#)/)) return 'video';
 if (u.match(/\.(zip|rar|7z|gz|tar)(\?|$|#)/)) return 'zip';
 return 'link';
}

function _bindFilesSection(projectId) {
 const panel = document.getElementById('files-panel');
 if (!panel) return;

 // ── Upload state ──
 let _pendingUploadFile = null;
 let _pendingUploadData = null;

 function resetUpload() {
  _pendingUploadFile = null;
  _pendingUploadData = null;
  const inp = panel.querySelector('#file-upload-input');
  const prev = panel.querySelector('#file-upload-preview');
  const idle = panel.querySelector('#file-upload-idle');
  if (inp) inp.value = '';
  if (prev) prev.style.display = 'none';
  if (idle) idle.style.display = '';
 }

 // ── URL input → auto-detect type ──
 const urlInput = panel.querySelector('#new-file-url');
 const typeSelect = panel.querySelector('#new-file-type');
 if (urlInput && typeSelect) {
  urlInput.addEventListener('input', () => {
   const url = urlInput.value.trim();
   if (!url) return;
   const detected = detectFileType(url);
   typeSelect.value = detected;
  });
  urlInput.addEventListener('paste', () => {
   setTimeout(() => {
    const url = urlInput.value.trim();
    if (!url) return;
    // Also auto-fill name from URL if name field is empty
    const nameInput = panel.querySelector('#new-file-name');
    const detected = detectFileType(url);
    typeSelect.value = detected;
    if (nameInput && !nameInput.value.trim()) {
     try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      const lastPart = parts[parts.length - 1] || u.hostname.replace('www.','');
      const cleaned = decodeURIComponent(lastPart).replace(/[-_]/g,' ').replace(/\.\w+$/, '');
      if (cleaned.length > 2 && cleaned.length < 60) nameInput.value = cleaned;
     } catch(_) {}
    }
   }, 50);
  });
 }

 // ── File upload input ──
 const fileInput = panel.querySelector('#file-upload-input');
 const triggerBtn = panel.querySelector('#file-upload-trigger-btn');
 if (triggerBtn) triggerBtn.addEventListener('click', () => fileInput && fileInput.click());

 function handleFileSelected(file) {
  if (!file) return;
  const MB = file.size / (1024*1024);
  if (MB > 4) {
   Toast.error(`File is ${MB.toFixed(1)} MB — max 4 MB. Use a link for larger files.`);
   return;
  }
  _pendingUploadFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
   _pendingUploadData = ev.target.result;
   const prev = panel.querySelector('#file-upload-preview');
   const idle = panel.querySelector('#file-upload-idle');
   const fname = panel.querySelector('#file-upload-fname');
   const fmeta = panel.querySelector('#file-upload-fmeta');
   const type = detectFileType(null, file.type);
   if (prev) prev.style.display = '';
   if (idle) idle.style.display = 'none';
   if (fname) fname.textContent = file.name;
   if (fmeta) fmeta.textContent = `${MB < 1 ? (file.size/1024).toFixed(0)+' KB' : MB.toFixed(2)+' MB'} · ${type.toUpperCase()}`;
  };
  reader.readAsDataURL(file);
 }

 if (fileInput) {
  fileInput.addEventListener('change', () => handleFileSelected(fileInput.files[0]));
 }

 // ── Click delegation ──
 panel.addEventListener('click', function handleFileClick(e) {
 const btn = e.target.closest('[data-action]');
 if (!btn) return;
 const action = btn.dataset.action;
 const fileId = btn.dataset.fileId;

 if (action === 'file-add') {
 const name = (panel.querySelector('#new-file-name')?.value||'').trim();
 const url = (panel.querySelector('#new-file-url')?.value||'').trim();
 const type = panel.querySelector('#new-file-type')?.value || 'link';
 if (!name) { Toast.error('Please add a name for this link'); panel.querySelector('#new-file-name')?.focus(); return; }
 if (!url) { Toast.error('Please paste a URL before adding'); panel.querySelector('#new-file-url')?.focus(); return; }
 const proj = DB.getProject(projectId);
 const files = [...(proj.files||[]), {
 id: genId(), name, url, type,
 dateAdded: new Date().toISOString().slice(0,10),
 addedBy: CURRENT_USER
 }];
 DB.updateProject(projectId, { files });
 _refreshFilesSection(projectId);
 _updateDetailTabBadge('files', files.length);
 Toast.success('Link added');
 return;
 }

 if (action === 'file-upload-confirm') {
  if (!_pendingUploadFile || !_pendingUploadData) { Toast.error('No file selected'); return; }
  const file = _pendingUploadFile;
  const MB = file.size / (1024*1024);
  const sizeLabel = MB < 1 ? `${(file.size/1024).toFixed(0)} KB` : `${MB.toFixed(2)} MB`;
  const type = detectFileType(null, file.type);
  const proj = DB.getProject(projectId);
  const files = [...(proj.files||[]), {
   id: genId(),
   name: file.name,
   url: '#',
   dataUrl: _pendingUploadData,
   type,
   fileSize: sizeLabel,
   dateAdded: new Date().toISOString().slice(0,10),
   addedBy: CURRENT_USER
  }];
  try {
   DB.updateProject(projectId, { files });
  } catch(storageErr) {
   Toast.error('Storage full — file too large. Try uploading a smaller file or use a link instead.');
   resetUpload();
   return;
  }
  _refreshFilesSection(projectId);
  _updateDetailTabBadge('files', files.length);
  Toast.success(`${file.name} uploaded`);
  return;
 }

 if (action === 'file-upload-cancel') {
  resetUpload();
  return;
 }

 if (action === 'file-delete') {
 if (!confirm('Remove this file/link?')) return;
 const proj = DB.getProject(projectId);
 const files = (proj.files||[]).filter(f => f.id !== fileId);
 DB.updateProject(projectId, { files });
 _refreshFilesSection(projectId);
 _updateDetailTabBadge('files', files.length);
 Toast.success('File removed');
 return;
 }

 if (action === 'file-edit-name' || action === 'file-edit-url') {
 const field = action === 'file-edit-name' ? 'name' : 'url';
 _activateFileInlineEdit(btn, projectId, fileId, field);
 return;
 }
 });
}

function _activateFileInlineEdit(el, projectId, fileId, field) {
 if (el.querySelector('input')) return;
 const currentText = el.textContent.trim();
 const inp = document.createElement('input');
 inp.type = field === 'url' ? 'url' : 'text';
 inp.value = currentText;
 inp.className = 'input input-sm';
 inp.style.cssText = 'width:100%;font-size:12px;padding:2px 6px';
 el.textContent = '';
 el.appendChild(inp);
 inp.focus(); inp.select();

 function save() {
 const val = inp.value.trim();
 const proj = DB.getProject(projectId);
 const files = proj.files || [];
 const f = files.find(x => x.id === fileId);
 if (f && val) { f[field] = val; DB.updateProject(projectId, { files }); }
 _refreshFilesSection(projectId);
 }
 function cancel() { el.textContent = currentText; }

 inp.addEventListener('blur', save);
 inp.addEventListener('keydown', e => {
 if (e.key === 'Enter') { e.preventDefault(); inp.removeEventListener('blur',save); save(); }
 if (e.key === 'Escape') { e.preventDefault(); inp.removeEventListener('blur',save); cancel(); }
 });
}

 if (!container) return;
 container.innerHTML = _buildFilesSection(proj);
 _bindFilesSection(projectId);
}

 el.addEventListener('keydown', e => {
 // Don't intercept keypresses inside an active input/textarea child
 if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

/* ── Activate inline edit for a field ── */
function _activateInlineEdit(el, projectId) {
 if (el.querySelector('input, select')) return; // already editing

 const field = el.dataset.field;
 const type = el.dataset.type || 'text';
 const project = DB.getProject(projectId);
 if (!project) return;

 // Raw stored value
 let rawVal = project[field];

 const isNameField = el.classList.contains('dv-project-name-value');

 // Build replacement input
 let inputEl;
 if (type === 'date') {
 inputEl = document.createElement('input');
 inputEl.type = 'date';
 inputEl.value = rawVal || '';
 inputEl.className = 'dv-field-input';
 inputEl.style.colorScheme = 'dark';
 } else if (type === 'number') {
 inputEl = document.createElement('input');
 inputEl.type = 'number';
 inputEl.value = rawVal || '';
 inputEl.min = '0';
 inputEl.placeholder = '0';
 inputEl.className = isNameField ? 'dv-field-input' : 'dv-field-input value-large';
 } else {
 inputEl = document.createElement('input');
 inputEl.type = 'text';
 inputEl.value = rawVal || '';
 inputEl.className = isNameField ? 'dv-project-name-input' : 'dv-field-input';
 }

 // Swap element content
 const originalHtml = el.innerHTML;
 el.innerHTML = '';
 el.appendChild(inputEl);
 inputEl.focus();
 inputEl.select();

 // Save on blur / Enter, cancel on Escape
 const save = () => {
 let newVal = inputEl.value.trim();
 if (newVal === '' && type !== 'date') newVal = rawVal; // revert if blank text

 const changes = { [field]: newVal || null };

 // Special: update breadcrumb if project name changed
 if (field === 'projectName' && newVal) {
 const breadcrumb = document.getElementById('dv-breadcrumb-name');
 if (breadcrumb) breadcrumb.textContent = newVal;
 }

 DB.updateProject(projectId, changes);
 const updated = DB.getProject(projectId);

 // Re-render display value
 let displayVal;
 if (type === 'date') {
 displayVal = newVal ? formatDate(newVal) : '<span style="color:var(--text-muted);font-style:italic">Not set</span>';
 } else if (type === 'number') {
 displayVal = formatCurrency(newVal);
 } else {
 displayVal = escHtml(newVal || '—');
 }

 if (isNameField) {
 el.className = 'dv-project-name-value';
 el.innerHTML = displayVal;
 } else {
 el.innerHTML = displayVal + '<span class="edit-hint"></span>';
 }

 Toast.success('Saved');
 _rebindField(el, projectId);
 };

 const cancel = () => {
 if (isNameField) {
 el.className = 'dv-project-name-value';
 }
 el.innerHTML = originalHtml;
 _rebindField(el, projectId);
 };

 inputEl.addEventListener('blur', save);
 inputEl.addEventListener('keydown', e => {
 if (e.key === 'Enter') { e.preventDefault(); inputEl.removeEventListener('blur', save); save(); }
 if (e.key === 'Escape') { e.preventDefault(); inputEl.removeEventListener('blur', save); cancel(); }
 });
}

/* Rebind click handler after save/cancel */
function _rebindField(el, projectId) {
 el.onclick = null;
 el.addEventListener('click', () => _activateInlineEdit(el, projectId));
 el.addEventListener('keydown', e => {
 if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
 if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); _activateInlineEdit(el, projectId); }
 });
}

function _bindTeamEdit(projectId) {
 const tagsEl = document.getElementById('dv-team-tags');

 // Remove member on × click
 tagsEl.querySelectorAll('.dv-member-tag-remove').forEach(btn => {

 e.stopPropagation();

 const removed = members[idx];
 members.splice(idx, 1);

 // Add member on Enter
 if (teamInput) {

 // Cancel

function _buildPdfLayout(project) {
  const today = new Date();
  const todayStr = today.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  // Progress — milestone-driven (matches the dashboard bar)
  const tasks = project.tasks || [];
  const progress = getMilestoneProgress(project);

  // Target launch display
  let launchDisplay = 'TBD';
  let launchSub = '';
  if (project.targetLaunchDate) {
    const d = new Date(project.targetLaunchDate + 'T00:00:00');
    launchDisplay = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const diffDays = Math.round((d - today) / 86400000);
    if (diffDays > 0) launchSub = `${diffDays} days away`;
    else if (diffDays === 0) launchSub = 'Today';
    else launchSub = `${Math.abs(diffDays)} days ago`;
  }

  // Account manager
  const amMember = (project.teamMembers || []).find(m => m.isAccountManager);
  const amName = amMember ? amMember.name : '—';
  const ownerName = project.owner || CURRENT_USER || '—';

  // Value
  const valueStr = project.value
    ? '$' + Number(project.value).toLocaleString()
    : '—';

  // Status
  const statusLabel = project.status || 'In Progress';

  // Big Bet badge
  const bigBetHtml = project.isBigBet
    ? `<div class="pdf-big-bet-badge">&#9733; Big Bet</div>`
    : '';

  // Tasks — incomplete first, up to 8
  const incomplete = tasks.filter(t => t.status !== 'Done');
  const complete = tasks.filter(t => t.status === 'Done');
  const taskList = [...incomplete, ...complete].slice(0, 8);
  const taskCountNote = tasks.length > 8
    ? `${Math.min(8, tasks.length)} of ${tasks.length} shown · incomplete first`
    : `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;

  function taskChipClass(status) {
    if (status === 'Done') return 'done';
    if (status === 'In Progress') return 'in-progress';
    if (status === 'Blocked') return 'blocked';
    return 'not-started';
  }
  function taskChipLabel(status) {
    if (status === 'In Progress') return 'In Progress';
    return status || 'Not Started';
  }

  const taskRows = taskList.map(t => {
    const isDone = t.status === 'Done';
    const checkHtml = isDone
      ? `<div class="pdf-task-check done">&#10003;</div>`
      : `<div class="pdf-task-check"></div>`;
    let dueHtml = '';
    if (t.dueDate) {
      const dueD = new Date(t.dueDate + 'T00:00:00');
      const overdue = !isDone && dueD < today;
      const dueLabel = dueD.toLocaleDateString('en-US', { month:'short', day:'numeric' });
      dueHtml = overdue
        ? `<span class="pdf-task-overdue">${escHtml(dueLabel)}</span>`
        : `<span class="pdf-task-due">${escHtml(dueLabel)}</span>`;
    }
    return `<tr>
      <td>${checkHtml}</td>
      <td>${escHtml(t.name || '')}</td>
      <td style="color:#888;font-size:10px">${escHtml(t.owner || '')}</td>
      <td>${dueHtml}</td>
      <td><span class="pdf-task-chip ${taskChipClass(t.status)}">${taskChipLabel(t.status)}</span></td>
    </tr>`;
  }).join('');

  // Notes — last 3
  // Sort newest-first, take last 3, then reverse so oldest prints first (reads chronologically)
  const notes = [...(project.notes || [])].sort((a, b) => (a.timestamp||'') < (b.timestamp||'') ? 1 : -1).slice(0, 3).reverse();
  const noteCountNote = (project.notes||[]).length > 3
    ? `${Math.min(3,(project.notes||[]).length)} of ${(project.notes||[]).length} shown · most recent`
    : `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

  const noteItems = notes.map(n => {
    const when = n.timestamp ? new Date(n.timestamp).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '';
    return `<div class="pdf-note-item">
      <div class="pdf-note-meta">
        <span class="pdf-note-author">${escHtml(n.author || '')}</span>
        <span class="pdf-note-when">${escHtml(when)}</span>
      </div>
      <div class="pdf-note-body">${escHtml(n.body || '')}</div>
    </div>`;
  }).join('');

  return `<div class="pdf-page">
    <div class="pdf-header">
      <div class="pdf-header-left">
        <div class="pdf-header-client">${escHtml(project.clientName || '')}</div>
        <div class="pdf-header-name">${escHtml(project.projectName || 'Untitled Project')}</div>
      </div>
      <div class="pdf-header-right">
        <div class="pdf-status-badge"><span class="pdf-status-dot"></span>${escHtml(statusLabel)}</div>
        ${bigBetHtml}
        <div class="pdf-generated">Generated ${todayStr}</div>
      </div>
    </div>

    <div class="pdf-metrics-strip">
      <div class="pdf-metric-cell">
        <div class="pdf-metric-label">Project Value</div>
        <div class="pdf-metric-value accent">${escHtml(valueStr)}</div>
        <div class="pdf-metric-sub">Contract value</div>
      </div>
      <div class="pdf-metric-cell">
        <div class="pdf-metric-label">Progress</div>
        <div class="pdf-metric-value">${progress}%</div>
        <div class="pdf-progress-track"><div class="pdf-progress-fill" style="width:${progress}%"></div></div>
        <div class="pdf-progress-labels"><span>0%</span><span>100%</span></div>
      </div>
      <div class="pdf-metric-cell">
        <div class="pdf-metric-label">Target Launch</div>
        <div class="pdf-metric-value" style="font-size:15px">${escHtml(launchDisplay)}</div>
        ${launchSub ? `<div class="pdf-metric-sub">${escHtml(launchSub)}</div>` : ''}
      </div>
      <div class="pdf-metric-cell">
        <div class="pdf-metric-label">Account Manager</div>
        <div class="pdf-metric-value" style="font-size:14px">${escHtml(amName)}</div>
        <div class="pdf-metric-sub">${escHtml(ownerName)} &middot; owner</div>
      </div>
    </div>

    <div class="pdf-body">
      ${tasks.length ? `
      <div>
        <div class="pdf-section-header">
          <span class="pdf-section-title">Tasks</span>
          <span class="pdf-section-divider"></span>
          <span class="pdf-section-count">${taskCountNote}</span>
        </div>
        <table class="pdf-task-table">
          <thead><tr>
            <th style="width:18px"></th>
            <th>Task</th>
            <th>Owner</th>
            <th>Due</th>
            <th>Status</th>
          </tr></thead>
          <tbody>${taskRows}</tbody>
        </table>
      </div>` : ''}

      ${notes.length ? `
      <div>
        <div class="pdf-section-header">
          <span class="pdf-section-title">Notes</span>
          <span class="pdf-section-divider"></span>
          <span class="pdf-section-count">${noteCountNote}</span>
        </div>
        <div class="pdf-notes-list">${noteItems}</div>
      </div>` : ''}
    </div>

    <div class="pdf-footer">
      <div class="pdf-footer-brand">Client Project Tracker</div>
      <div class="pdf-footer-meta">${escHtml(project.clientName || '')} &bull; ${escHtml(project.projectName || '')}</div>
      <div class="pdf-footer-page">Page 1</div>
    </div>
  </div>`;
}

function exportDashboardPdf() {
  const today = new Date();
  const todayStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const allFiltered = getFilteredProjects();
  if (!allFiltered.length) {
    Toast.error('No projects to export.');
    return;
  }

  // Header title
  let headerTitle = 'All Projects';
  if (AppState.filterClients.length === 1) {
    const c = DB.getClient(AppState.filterClients[0]);
    if (c) headerTitle = c.name || headerTitle;
  }
  const amLabel = AppState.filterAccountManager || '';

  // Progress driven by milestones (matches the dashboard bar)
  function projProgress(p) { return getMilestoneProgress(p); }

  // Status colour map (matches the app's CSS variables)
  function statusColors(status) {
    const map = {
      'Planning':      { color: '#6b7280', bg: 'rgba(107,114,128,.12)', bar: '#6b7280' },
      'Not Started':   { color: '#6b7280', bg: 'rgba(107,114,128,.12)', bar: '#6b7280' },
      'In Discussion': { color: '#f59e0b', bg: 'rgba(245,158,11,.12)',  bar: '#f59e0b' },
      'In Progress':   { color: '#8b5cf6', bg: 'rgba(139,92,246,.12)',  bar: 'linear-gradient(90deg,#6366f1,#8b5cf6)' },
      'Launching':     { color: '#3b82f6', bg: 'rgba(59,130,246,.12)',  bar: 'linear-gradient(90deg,#3b82f6,#10b981)' },
      'Live':          { color: '#10b981', bg: 'rgba(16,185,129,.12)',  bar: 'linear-gradient(90deg,#10b981,#34d399)' },
      'Completed':     { color: '#10b981', bg: 'rgba(16,185,129,.12)',  bar: 'linear-gradient(90deg,#10b981,#2dd4bf)' },
      'Paused':        { color: '#eab308', bg: 'rgba(234,179,8,.12)',   bar: '#eab308' },
      'On Hold':       { color: '#eab308', bg: 'rgba(234,179,8,.12)',   bar: '#eab308' },
    };
    return map[status] || { color: '#6b7280', bg: 'rgba(107,114,128,.12)', bar: '#6b7280' };
  }

  // Next deadline display (same logic as the dashboard)
  function deadlineInfo(p) {
    const candidates = [];
    (p.tasks || []).forEach(t => { if (t.dueDate && t.status !== 'Done') candidates.push(t.dueDate); });
    const nd = candidates.length ? candidates.sort()[0] : (p.targetLaunchDate || null);
    if (!nd) return { label: '—', cls: '' };
    const d = new Date(nd + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    const hasIncomplete = candidates.length > 0;
    let label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    let cls = '';
    if (hasIncomplete) {
      if (diff < 0)      { label = `${label} · ${Math.abs(diff)}d overdue`; cls = 'overdue'; }
      else if (diff === 0) { label = 'Due today'; cls = 'soon'; }
      else if (diff === 1) { label = 'Due tomorrow'; cls = 'soon'; }
      else if (diff <= 7)  { label = `${label} · ${diff}d`; cls = 'soon'; }
    }
    return { label, cls };
  }

  // Next incomplete milestone
  function nextMilestone(p) {
    const todayStr2 = today.toISOString().slice(0, 10);
    const upcoming = (p.milestones || [])
      .filter(m => !m.completed && m.date)
      .sort((a, b) => (a.date < b.date ? -1 : 1));
    return upcoming[0] || null;
  }

  // Build a project card that matches the dashboard card layout
  function buildCard(p) {
    const pct = projProgress(p);
    const sc = statusColors(p.status || 'Planning');
    const valueStr = p.value ? '$' + Number(p.value).toLocaleString() : '—';
    const dl = deadlineInfo(p);
    const ms = nextMilestone(p);
    const bigBetHtml = p.isBigBet
